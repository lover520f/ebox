name: ebox
description: Hills 风格 Emby 客户端 - 支持 Windows/Android Mobile/Android TV
publish_to: 'none'
version: 5.0.0+50000

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  go_router: ^13.0.0
  http: ^1.1.0
  video_player: ^2.8.1
  chewie: ^1.7.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.1
  intl: ^0.18.1
  cached_network_image: ^3.3.0
  connectivity_plus: ^5.0.2
  screen_brightness: ^0.2.2+1
  volume_controller: ^2.0.18
  wakelock: ^0.6.2
  audio_video_progress_bar: ^2.0.2
  file_picker: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  
  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-Regular.ttf
        - asset: assets/fonts/Montserrat-Bold.ttf
          weight: 700
        - asset: assets/fonts/Montserrat-SemiBold.ttf
          weight: 600
