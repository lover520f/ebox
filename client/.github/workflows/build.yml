name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'
          cache: true
      
      - name: Enable Windows Desktop
        working-directory: ./client
        run: flutter config --enable-windows-desktop
      
      - name: Get Flutter Dependencies
        working-directory: ./client
        run: flutter pub get
      
      - name: Build Windows
        working-directory: ./client
        run: flutter build windows --release
      
      - name: Package Windows Release
        working-directory: ./client
        run: |
          Compress-Archive -Path build/windows/runner/Release/* -DestinationPath ebox-windows-${{ github.ref_name }}.zip
          mv ebox-windows-${{ github.ref_name }}.zip ../
      
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: ebox-windows-${{ github.ref_name }}.zip

  build-android:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'
          cache: true
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Get Flutter Dependencies
        working-directory: ./client
        run: flutter pub get
      
      - name: Build Android APK (Unified)
        working-directory: ./client
        run: flutter build apk --release
      
      - name: Rename APK
        working-directory: ./client
        run: |
          cp build/app/outputs/flutter-apk/release/app-release.apk ebox-mobile-${{ github.ref_name }}.apk
          cp build/app/outputs/flutter-apk/release/app-release.apk ebox-tv-${{ github.ref_name }}.apk
      
      - name: Upload Mobile APK
        uses: actions/upload-artifact@v4
        with:
          name: android-mobile
          path: client/ebox-mobile-${{ github.ref_name }}.apk
      
      - name: Upload TV APK
        uses: actions/upload-artifact@v4
        with:
          name: android-tv
          path: client/ebox-tv-${{ github.ref_name }}.apk

  create-release:
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Windows Build
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: ./artifacts
      
      - name: Download Mobile APK
        uses: actions/download-artifact@v4
        with:
          name: android-mobile
          path: ./artifacts
      
      - name: Download TV APK
        uses: actions/download-artifact@v4
        with:
          name: android-tv
          path: ./artifacts
      
      - name: List artifacts
        run: ls -la ./artifacts/
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: E 宝盒 ${{ github.ref_name }}
          body_path: RELEASE_NOTES_v5.0.0.md
          files: |
            ./artifacts/*.zip
            ./artifacts/*.apk
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
