name: Build APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'
      
      - name: Get Dependencies
        working-directory: ./client
        run: flutter pub get
      
      - name: Build APK
        working-directory: ./client
        run: flutter build apk --release
        timeout-minutes: 30
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: E 宝盒 ${{ github.ref_name }}
          body: 自动构建的 APK
          files: ./client/build/app/outputs/flutter-apk/release/app-release.apk
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
