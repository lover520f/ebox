name: Build APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'
          cache: true
      
      - name: Enable Android
        run: flutter config --enable-android
      
      - name: Flutter Doctor
        run: flutter doctor
      
      - name: Get Dependencies
        working-directory: ./client
        run: flutter pub get
      
      - name: Build APK
        working-directory: ./client
        run: flutter build apk --release
      
      - name: Find and Rename APK
        run: |
          echo "=== Searching for APK ==="
          find client/build -name "*.apk" -type f 2>/dev/null || echo "No APK found yet"
          
          if [ -f "client/build/app/outputs/flutter-apk/release/app-release.apk" ]; then
            echo "✓ Found APK at standard location"
            cp client/build/app/outputs/flutter-apk/release/app-release.apk ebox-android-${{ github.ref_name }}.apk
          else
            echo "⚠ APK not at standard location, checking alternatives..."
            find client/build -name "app-release.apk" -type f -exec cp {} ebox-android-${{ github.ref_name }}.apk \; 2>/dev/null || true
            find client/build -name "*.apk" -type f -exec cp {} ebox-android-${{ github.ref_name }}.apk \; 2>/dev/null || true
          fi
          
          echo "=== APK Files ==="
          ls -lh ebox-android-*.apk 2>/dev/null || echo "No APK files found"
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: E 宝盒 ${{ github.ref_name }}
          body_file: RELEASE_NOTES_v5.0.0.md
          files: ebox-android-${{ github.ref_name }}.apk
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
