name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'
          cache: true
      
      - name: Enable Platforms
        run: |
          flutter config --enable-linux-desktop
          flutter config --enable-windows-desktop
          flutter config --enable-macos-desktop
          flutter config --enable-android
          flutter doctor
      
      - name: Get Dependencies
        working-directory: ./client
        run: flutter pub get
      
      - name: Analyze Code
        working-directory: ./client
        run: flutter analyze
        continue-on-error: true
      
      - name: Build APK
        working-directory: ./client
        run: flutter build apk --release
      
      - name: Find APK
        run: |
          find client/build -name "*.apk" -type f
          if [ -f "client/build/app/outputs/flutter-apk/release/app-release.apk" ]; then
            cp client/build/app/outputs/flutter-apk/release/app-release.apk ebox-android-${{ github.ref_name }}.apk
            echo "✓ APK found"
          elif [ -f "client/build/app/outputs/flutter-apk/release/app-release.apk" ]; then
            find client/build -name "app-release.apk" -exec cp {} ebox-android-${{ github.ref_name }}.apk \;
            echo "✓ APK copied from alternate location"
          else
            echo "⚠ APK not found, trying appbundle"
            flutter build appbundle --release
          fi
      
      - name: Build Web (fallback)
        if: failure()
        working-directory: ./client
        run: flutter build web --release
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-apk
          path: ebox-android-${{ github.ref_name }}.apk
          if-no-files-found: warn
          retention-days: 5

  create-release:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: ./artifacts
      
      - name: List Files
        run: ls -la ./artifacts/ || echo "No artifacts"
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: E 宝盒 ${{ github.ref_name }}
          body_file: RELEASE_NOTES_v5.0.0.md
          files: ./artifacts/*.*
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
