name: Build Windows Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如 v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
      
      - name: Create and Push Tag
        run: |
          $VERSION = "${{ github.event.inputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 删除已存在的 tag
          git tag -d $VERSION -ErrorAction SilentlyContinue
          git push origin :refs/tags/$VERSION -ErrorAction SilentlyContinue
          
          # 创建并推送新 tag
          git tag $VERSION
          git push origin $VERSION
          
          Write-Host "已创建并推送 tag: $VERSION"
      
      - name: Enable Windows Support
        working-directory: ./client
        run: flutter config --enable-windows-desktop
      
      - name: Build Windows
        working-directory: ./client
        run: |
          # 删除旧的 pubspec.lock，在 Windows 上重新生成
          Remove-Item pubspec.lock -ErrorAction SilentlyContinue
          flutter pub get
          
          # 运行 build_runner 生成 Hive 适配器
          flutter pub run build_runner build --delete-conflicting-outputs
          
          flutter build windows --release
      
      - name: Verify Build
        working-directory: ./client
        run: |
          # 检查两种可能的文件名（注意 x64 目录）
          if (Test-Path "build\windows\x64\runner\Release\client.exe") {
            Write-Host "✅ 构建成功：client.exe 存在"
            Get-ChildItem -Path "build\windows\x64\runner\Release" | Format-Table Name, Length
          } elseif (Test-Path "build\windows\runner\Release\client.exe") {
            Write-Host "✅ 构建成功：client.exe 存在"
            Get-ChildItem -Path "build\windows\runner\Release" | Format-Table Name, Length
          } else {
            Write-Error "❌ 构建失败：exe 文件不存在"
            Get-ChildItem -Path "build\windows" -Recurse -Filter "*.exe" | Format-Table FullName, Length
            exit 1
          }
      
      - name: Create ZIP
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path "client\build\windows\x64\runner\Release\*" `
            -DestinationPath "dist/ebox-${{ github.event.inputs.version }}-portable.zip" -Force
          
          $zipSize = [math]::Round((Get-Item "dist/ebox-${{ github.event.inputs.version }}-portable.zip").Length / 1MB, 2)
          Write-Host "便携版大小：$zipSize MB"
      
      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          name: E 宝盒 ${{ github.event.inputs.version }}
          files: dist/ebox-${{ github.event.inputs.version }}-portable.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
