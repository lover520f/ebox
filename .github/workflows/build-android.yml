name: Build Android APK

on:
  push:
    tags:
      - 'v*-android'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号'
        required: true
        default: 'v5.0.8'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'
      
      - name: Build APK
        working-directory: ./client
        run: |
          flutter pub get
          flutter build apk --release --verbose
      
      - name: Upload Release
        uses: softprops/action-gh-release@v3
        with:
          name: E 宝盒 ${{ github.ref_name || github.event.inputs.version }}
          tag_name: ${{ github.ref_name || github.event.inputs.version }}
          body: |
            ## Android APK
          files: ./client/build/app/outputs/flutter-apk/release/*.apk
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
