name: Build Android APK

on:
  push:
    tags:
      - 'v*-android'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号'
        required: true
        default: 'v5.0.8'

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'
      
      - name: Setup
        working-directory: ./client
        run: |
          flutter pub get
          echo "flutter.sdk=$FLUTTER_HOME" > android/local.properties
          echo "flutter.buildMode=release" >> android/local.properties
          TAG=${{ github.ref_name }}
          if [ -z "$TAG" ]; then TAG=${{ github.event.inputs.version }}; fi
          echo "flutter.versionName=$TAG" >> android/local.properties
          echo "flutter.versionCode=50008" >> android/local.properties
          cat android/local.properties
      
      - name: Build
        working-directory: ./client
        run: flutter build apk --release
      
      - name: Upload
        uses: softprops/action-gh-release@v3
        with:
          name: E 宝盒 ${{ github.ref_name || github.event.inputs.version }}
          tag_name: ${{ github.ref_name || github.event.inputs.version }}
          body: |
            ## Android APK
            
            下载后直接安装
          files: ./client/build/app/outputs/flutter-apk/release/app-release.apk
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
