name: Build Windows

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如 v5.0.8)'
        required: true
        default: 'v5.0.8'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'
      
      - name: Enable Windows
        run: flutter config --enable-windows-desktop
      
      - name: Get Dependencies
        working-directory: ./client
        run: flutter pub get
      
      - name: Build Windows
        working-directory: ./client
        run: flutter build windows --release
      
      - name: Create ZIP
        shell: pwsh
        working-directory: ./client
        run: |
          $src = "build\windows\runner\Release"
          $dst = "ebox-windows.zip"
          
          Write-Host "Creating ZIP from: $src"
          Get-ChildItem -Path $src | ForEach-Object { Write-Host "  - $($_.Name)" }
          
          Compress-Archive -Path "$src\*" -DestinationPath $dst -Force
          Write-Host "ZIP created: $dst"
          Get-Item $dst | Select-Object Name,Length
      
      - name: Upload Release
        uses: softprops/action-gh-release@v3
        with:
          name: E 宝盒 ${{ github.event.inputs.version }}
          body: |
            ## 📦 Windows 便携版
            
            ### 使用说明
            1. 下载 ebox-windows.zip
            2. 解压到任意目录
            3. 运行 ebox_client.exe
            
            ## ✨ 功能
            - Hills 风格 UI
            - 服务器管理
            - 媒体库浏览
            - 视频播放
          files: ./client/ebox-windows.zip
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
