name: Build Windows EXE

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如 v5.0.8)'
        required: true
        default: 'v5.0.8'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'
      
      - name: Setup
        run: |
          flutter config --enable-windows-desktop
        shell: bash
      
      - name: Build
        working-directory: ./client
        run: flutter build windows --release
      
      - name: Package
        shell: pwsh
        working-directory: ./client/build/windows/runner/Release
        run: |
          $zip = "..\..\..\..\ebox-windows.zip"
          Compress-Archive -Path * -DestinationPath $zip -Force
          Write-Host "Created: $zip"
          Get-Item $zip | Select-Object Name,Length
      
      - name: Upload
        uses: softprops/action-gh-release@v3
        if: always()
        with:
          name: E 宝盒 ${{ github.event.inputs.version }}
          tag_name: ${{ github.event.inputs.version }}-windows
          body: |
            ## Windows 便携版
            
            解压后运行 ebox_client.exe
          files: ./client/build/windows/runner/Release/../../../../ebox-windows.zip
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
