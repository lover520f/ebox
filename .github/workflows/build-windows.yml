name: Build Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号'
        required: true
        default: 'v5.0.8'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'
      
      - name: Check Version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi
      
      - name: Enable Windows
        run: flutter config --enable-windows-desktop
      
      - name: Get Dependencies
        working-directory: ./client
        run: flutter pub get
      
      - name: Build Windows
        working-directory: ./client
        run: flutter build windows --release
      
      - name: Find Executable
        shell: pwsh
        id: find
        run: |
          $exePath = Get-ChildItem -Path "client\build\windows\runner\Release" -Filter "*.exe" | Select-Object -First 1
          if ($exePath) {
            Write-Host "Found: $($exePath.FullName)"
            echo "exe=$($exePath.FullName)" >> $env:GITHUB_OUTPUT
          } else {
            Write-Error "Executable not found"
            exit 1
          }
        
      - name: Create Release EXE
        shell: pwsh
        run: |
          $src = ${{ steps.find.outputs.exe }}
          $dst = "ebox_client.exe"
          
          # 复制主程序
          Copy-Item $src $dst
          
          # 复制依赖文件
          Get-ChildItem -Path "client\build\windows\runner\Release" -Exclude "*.exe" -File | 
            Copy-Item -Destination "."
          
          Write-Host "Release files:"
          Get-ChildItem | Select-Object Name,Length
          
          # 创建 ZIP
          Compress-Archive -Path ".\*" -DestinationPath "ebox-windows.zip" -Force
          Write-Host "ZIP: ebox-windows.zip"
          
        working-directory: ./client/temp
        continue-on-error: true
      
      - name: Simple ZIP
        shell: pwsh
        run: |
          cd client
          $dir = "build\windows\runner\Release"
          if (Test-Path $dir) {
            Compress-Archive -Path "$dir\*" -DestinationPath "ebox-windows.zip" -Force
            Write-Host "✓ Created ebox-windows.zip"
            Get-Item ebox-windows.zip | Select-Object Name,Length
          } else {
            Write-Error "Not found: $dir"
            exit 1
          }
      
      - name: Upload Release
        uses: softprops/action-gh-release@v3
        with:
          name: E 宝盒 ${{ steps.version.outputs.tag }}
          body: |
            ## 📦 Windows 便携版
            
            ### 使用
            1. 下载 ebox-windows.zip
            2. 解压运行 ebox_client.exe
            
            ## ✨ 功能
            - Hills 风格 UI
            - Emby 客户端
            - 媒体播放
          files: ./client/ebox-windows.zip
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
