name: Release Android

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如 v5.0.8)'
        required: true
        default: 'v5.0.8'

permissions:
  contents: write

jobs:
  release-android:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'
      
      - name: Get Dependencies
        working-directory: ./client
        run: flutter pub get
      
      - name: Create local.properties
        working-directory: ./client/android
        run: |
          echo "flutter.sdk=$FLUTTER_HOME" > local.properties
          echo "flutter.versionName=${{ github.event.inputs.version }}" >> local.properties
          echo "flutter.versionCode=50008" >> local.properties
          echo "flutter.buildMode=release" >> local.properties
          cat local.properties
      
      - name: Build APK
        working-directory: ./client
        run: flutter build apk --release
      
      - name: Find APK
        id: apk
        run: |
          APK=$(find ./client/build -name "*.apk" | head -1)
          echo "path=$APK" >> $GITHUB_OUTPUT
          ls -lh "$APK"
      
      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          name: E 宝盒 ${{ github.event.inputs.version }}
          tag_name: ${{ github.event.inputs.version }}
          body: |
            ## 📱 Android 版本
            
            ### 安装说明
            1. 下载 app-release.apk
            2. 在 Android 上允许安装未知来源
            3. 安装并运行
            
            ## ✨ 功能
            - Hills 风格渐变 UI
            - 多服务器管理
            - 媒体库浏览
            - 视频播放
          files: ${{ steps.apk.outputs.path }}
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
