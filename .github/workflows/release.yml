name: Release All Platforms

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
      - run: cd client && flutter pub get && flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: client/build/app/outputs/flutter-apk/app-release.apk

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
      - run: cd client && flutter pub get && flutter build windows --release
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: client/build/windows/runner/Release/ebox.exe

  release:
    needs: [android, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: android
          path: .
      - uses: actions/download-artifact@v4
        with:
          name: windows
          path: .
      - uses: softprops/action-gh-release@v3
        with:
          name: E 宝盒 ${{ github.ref_name }}
          body: |
            ## 📱 E 宝盒 ${{ github.ref_name }}
            
            ### Windows
            - 下载 ebox.exe
            - 双击运行，无需安装
            
            ### Android
            - 下载 app-release.apk
            - 允许未知来源安装
            
            ### 功能
            - Hills 风格 UI (紫色 -蓝色渐变)
            - Emby 客户端
            - 电影/剧集浏览
            - 视频播放
            - 收藏管理
            
            ⚠️ AI 测试版本
          files: |
            app-release.apk
            ebox.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
