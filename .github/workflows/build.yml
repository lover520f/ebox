name: Build Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: android
          - os: windows-latest
            target: windows
    
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'
      
      - name: Setup Java (Android only)
        if: matrix.target == 'android'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Enable Platform
        shell: bash
        run: |
          if [ "${{ matrix.target }}" = "android" ]; then
            flutter config --enable-android
          else
            flutter config --enable-windows-desktop
          fi
      
      - name: Get Dependencies
        working-directory: client
        run: flutter pub get
      
      - name: Build
        working-directory: client
        shell: bash
        run: |
          if [ "${{ matrix.target }}" = "android" ]; then
            flutter build apk --release
          else
            flutter build windows --release
          fi
      
      - name: Find Output
        id: find
        shell: pwsh
        run: |
          if ("${{ matrix.target }}" -eq "android") {
            $file = Get-ChildItem -Path "client/build/app/outputs/flutter-apk/release" -Filter "*.apk" | Select-Object -First 1
            if ($file) {
              echo "file=$($file.FullName)" >> $env:GITHUB_OUTPUT
              echo "name=app-release.apk" >> $env:GITHUB_OUTPUT
            }
          } else {
            $dir = "client/build/windows/runner/Release"
            if (Test-Path $dir) {
              Compress-Archive -Path "$dir/*" -DestinationPath "ebox-windows.zip" -Force
              echo "file=ebox-windows.zip" >> $env:GITHUB_OUTPUT
              echo "name=ebox-windows.zip" >> $env:GITHUB_OUTPUT
            }
          }
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ebox-${{ matrix.target }}
          path: ${{ steps.find.outputs.file }}
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Android
        uses: actions/download-artifact@v4
        with:
          name: ebox-android
          path: ./android
          
      - name: Download Windows
        uses: actions/download-artifact@v4
        with:
          name: ebox-windows
          path: ./windows
          
      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          name: E 宝盒 ${{ github.ref_name }}
          body: |
            ## 下载
            - Android: app-release.apk
            - Windows: ebox-windows.zip
          files: |
            ./android/*.apk
            ./windows/*.zip
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
