name: Build Windows & Android

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'
      
      - name: Get Dependencies
        working-directory: ./client
        run: flutter pub get
        
      - name: Build APK
        working-directory: ./client
        run: |
          cd android
          ./gradlew assembleRelease
        continue-on-error: true
      
      - name: Build APK (Flutter)
        working-directory: ./client
        run: flutter build apk --release
        continue-on-error: true
        
      - name: Find APK
        id: find_apk
        run: |
          APK=$(find ./client/build -name "*.apk" -type f 2>/dev/null | head -1)
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          ls -la "$APK" 2>/dev/null || echo "APK not found"
        
      - name: Upload APK
        if: steps.find_apk.outputs.apk_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: ebox-android
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 7

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'
      
      - name: Enable Windows
        run: flutter config --enable-windows-desktop
        
      - name: Get Dependencies
        working-directory: ./client
        run: flutter pub get
        
      - name: Build Windows
        working-directory: ./client
        run: flutter build windows --release
        
      - name: Find Build Files
        run: |
          Get-ChildItem -Path "client\build\windows" -Recurse -Filter "*.exe" | ForEach-Object {
            Write-Host "Found: $($_.FullName)"
          }
          
      - name: Create ZIP
        shell: pwsh
        run: |
          $releasePath = "client\build\windows\runner\Release"
          if (Test-Path $releasePath) {
            New-Item -ItemType Directory -Force -Path dist | Out-Null
            Compress-Archive -Path "$releasePath\*" `
              -DestinationPath "dist\ebox-windows.zip" -Force
            Write-Host "ZIP created successfully"
          } else {
            Write-Error "Release path not found: $releasePath"
            exit 1
          }
          
      - name: Upload Windows
        uses: actions/upload-artifact@v4
        with:
          name: ebox-windows
          path: dist/ebox-windows.zip
          retention-days: 7

  release:
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download APK
        if: needs.build-android.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: ebox-android
          path: ./artifacts/android
          
      - name: Download Windows
        if: needs.build-windows.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: ebox-windows
          path: ./artifacts/windows
          
      - name: List Files
        run: ls -la ./artifacts/ || echo "No artifacts"
        
      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          name: E 宝盒 v5.0.8
          body: |
            ## ✨ 功能特性
            - Hills 风格 UI
            - Emby 客户端
            - 服务器管理
            - 媒体浏览
            - 视频播放
            
            ## 📦 下载
            - Android: app-release.apk
            - Windows: ebox-windows.zip
          files: |
            ./artifacts/android/*.apk
            ./artifacts/windows/*.zip
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
