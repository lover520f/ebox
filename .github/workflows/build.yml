name: Build APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'
      
      - run: flutter config --enable-android
      
      - name: Get Dependencies
        working-directory: ./client
        run: flutter pub get
        
      - name: Build APK
        working-directory: ./client
        run: flutter build apk --release
        
      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          name: E 宝盒 ${{ github.ref_name }}
          body: |
            ## ✨ 功能特性
            - Hills 风格 UI
            - Emby 客户端
            - 服务器管理
            - 媒体浏览
            - 视频播放
          files: ./client/build/app/outputs/flutter-apk/release/app-release.apk
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
